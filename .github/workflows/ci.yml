name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          
      - name: Install dependencies
        run: |
          pip install -e ".[voice,automation,all]"
          pip install pytest pytest-asyncio ruff mypy || true
          
      - name: Lint
        run: ruff check nexus/
        
      - name: Type check
        run: mypy nexus --ignore-missing-imports
        
      - name: Test
        run: pytest -v tests/